services:
  db:
    image: postgres:16-alpine
    container_name: projeto-seguranca-db
    environment:
      POSTGRES_DB: digital_signature_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d digital_signature_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: projeto-seguranca-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: docker
      APP_SECRET: docker-demo-secret-change-me-1234567890
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: digital_signature_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      CORS_ALLOWED_METHODS: GET,POST,PUT,DELETE,OPTIONS
      CORS_ALLOWED_HEADERS: Authorization,Content-Type,X-Request-ID,X-CSRF-Token
      CORS_ALLOW_CREDENTIALS: "true"
      CORS_MAX_AGE: 3600
      WEBAUTHN_RP_ID: localhost
      WEBAUTHN_RP_NAME: Projeto_Seguranca
      WEBAUTHN_ORIGIN: http://localhost:5173
      JWT_PRIVATE_KEY_BASE64: 
      JWT_PUBLIC_KEY_BASE64: 
      JWT_ISSUER: projeto-3-seguranca
      REFRESH_TOKEN_COOKIE_NAME: refresh_token
      REFRESH_TOKEN_COOKIE_SECURE: "false"
      REFRESH_TOKEN_COOKIE_SAME_SITE: Strict
      REFRESH_TOKEN_COOKIE_PATH: /api/v1/auth/refresh
      REFRESH_TOKEN_EXPIRATION_DAYS: 7
      CSRF_COOKIE_NAME: XSRF-TOKEN
      CSRF_HEADER_NAME: X-CSRF-Token
      CSRF_COOKIE_SECURE: "false"
      CSRF_COOKIE_SAME_SITE: Strict
      CSRF_COOKIE_PATH: /
      TOTP_ENCRYPTION_KEY_BASE64: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      USER_KEY_ALGORITHM: RSA
      USER_KEY_ENCRYPTION_KEY_BASE64: AQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQE=
      PDF_SANDBOX_ENABLED: "true"
      PDF_SANDBOX_TIMEOUT_MS: 5000
      MAIL_HOST: smtp.gmail.com
      MAIL_PORT: 587
      MAIL_USERNAME: ""
      MAIL_PASSWORD: ""
      MAIL_FROM: no-reply@example.com
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8080/api/v1
    container_name: projeto-seguranca-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres-data:
